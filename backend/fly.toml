app = "attack-surface-monitor-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "true"
  auto_start_machines = "true"
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "attack_surface_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/data"
  url_prefix = "/data"
